<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:28px;background:var(--pd-cream-1);display:flex;flex-wrap:wrap;gap:14px;align-items:center}
.b{font-family:'Arial Narrow','Arial',sans-serif;font-stretch:condensed;font-size:13px;font-weight:700;text-transform:uppercase;padding:14px 24px;display:inline-flex;align-items:center;gap:10px}
.b.green{background:#2B9402;color:#FEBF00}
.b.yellow{background:#FEBF00;color:#005CE1}
.b.blue{background:#005CE1;color:#FEBF00}
.b.pill{border-radius:999px;padding:14px 28px}
.b.danger{background:#FF0000;color:#fff;border-radius:12px;padding:14px 26px}
.b.outline{background:transparent;color:#005CE1;box-shadow:inset 0 0 0 2px #005CE1}
.dot{width:9px;height:9px;border-radius:99px;background:currentColor}
</style></head><body>
<span class="b green">NOVO DROP</span>
<span class="b yellow">ESGOTADO</span>
<span class="b blue">PRÉ-VENDA</span>
<span class="b green pill"><span class="dot"></span>AO VIVO</span>
<span class="b danger">FALSO: usepedireito.shop</span>
<span class="b outline">#usepédireito</span>
</body></html>

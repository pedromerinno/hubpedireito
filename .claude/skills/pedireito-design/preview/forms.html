<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--pd-cream-1);display:flex;flex-direction:column;gap:14px}
label{font-family:'Arial Narrow','Arial',sans-serif;font-stretch:condensed;font-size:11px;text-transform:uppercase;color:#2B9402;display:block;margin-bottom:4px}
.fld input,.fld select{width:100%;font-family:Inter,sans-serif;font-size:16px;padding:14px 16px;background:#fff;border:2px solid #005CE1;color:#005CE1;box-sizing:border-box}
.fld input:focus,.fld select:focus{outline:0;border-color:#2B9402}
.chk{display:flex;align-items:center;gap:10px;font-family:Inter;font-size:14px;color:#005CE1}
.chk input{width:18px;height:18px;accent-color:#2B9402}
</style></head><body>
<div class="fld"><label>Email</label><input type="email" placeholder="voce@email.com"/></div>
<div class="fld"><label>Tamanho</label><select><option>Escolha</option><option>37/38</option><option>39/40</option></select></div>
<div class="chk"><input type="checkbox" checked/>Quero receber drops no WhatsApp</div>
</body></html>

<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:28px;background:var(--pd-cream-1);display:flex;flex-direction:column;gap:12px}
.btn{font-family:var(--font-display);font-size:20px;letter-spacing:.04em;text-transform:uppercase;padding:16px 28px;border:0;cursor:pointer;transition:background .08s,color .08s;display:inline-block;text-align:center}
.btn-primary{background:#2B9402;color:#FEBF00}
.btn-primary:hover{background:#1B6200}
.btn-secondary{background:#FEBF00;color:#2B9402}
.btn-secondary:hover{background:#FFCE00}
.btn-outline{background:transparent;color:#005CE1;box-shadow:inset 0 0 0 3px #005CE1}
.btn-outline:hover{background:#005CE1;color:#FEBF00}
.btn-danger{background:#FF0000;color:#fff}
.lbl{font-family:var(--font-narrow);font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--pd-verde-escuro);margin-right:10px;display:inline-block;min-width:80px}
.row{display:flex;align-items:center;gap:8px}
</style></head><body>
<div class="row"><span class="lbl">Primary</span><button class="btn btn-primary">Conheça a Pé Direito</button></div>
<div class="row"><span class="lbl">Secondary</span><button class="btn btn-secondary">Comprar agora</button></div>
<div class="row"><span class="lbl">Outline</span><button class="btn btn-outline">Saiba mais</button></div>
<div class="row"><span class="lbl">Danger</span><button class="btn btn-danger">Reportar link falso</button></div>
</body></html>

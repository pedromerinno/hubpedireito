<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:var(--pd-cream-1);font-family:var(--font-narrow);font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--pd-verde-escuro)}
.row{display:flex;align-items:flex-end;gap:14px;margin-bottom:8px}
.box{background:#2B9402}
.lbl{display:flex;flex-direction:column}
code{font-family:ui-monospace,monospace;font-size:10px;opacity:.7;text-transform:none;letter-spacing:0;color:#000}
</style></head><body>
<div class="row"><div class="box" style="width:4px;height:20px"></div><span class="lbl">SP-1 <code>4</code></span></div>
<div class="row"><div class="box" style="width:8px;height:20px"></div><span class="lbl">SP-2 <code>8</code></span></div>
<div class="row"><div class="box" style="width:16px;height:20px"></div><span class="lbl">SP-4 <code>16</code></span></div>
<div class="row"><div class="box" style="width:24px;height:20px"></div><span class="lbl">SP-5 <code>24</code></span></div>
<div class="row"><div class="box" style="width:32px;height:20px"></div><span class="lbl">SP-6 <code>32</code></span></div>
<div class="row"><div class="box" style="width:48px;height:20px"></div><span class="lbl">SP-7 <code>48</code></span></div>
<div class="row"><div class="box" style="width:64px;height:20px"></div><span class="lbl">SP-8 <code>64</code></span></div>
<div class="row"><div class="box" style="width:96px;height:20px"></div><span class="lbl">SP-9 <code>96</code></span></div>
</body></html>

<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:0;background:var(--pd-cream-1);display:grid;grid-template-columns:1fr 1fr;gap:0}
.card{aspect-ratio:4/5;padding:20px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.ct{display:flex;gap:8px;align-items:center}
.diamond{width:38px;height:22px;color:inherit}
.price{font-family:var(--font-display);font-size:18px}
.name{font-family:var(--font-lead);font-size:22px;text-transform:lowercase}
img{max-width:100%;width:100%;align-self:center;margin:auto 0}
.foot{display:flex;justify-content:space-between;align-items:end}
.size{font-family:'Arial Narrow','Arial',sans-serif;font-stretch:condensed;font-size:12px;text-transform:uppercase}
</style></head><body>
<div class="card" style="background:#2B9402;color:#FEBF00">

</div>

<div class="ct"><svg class="diamond" viewBox="0 0 497 280" fill="currentColor"><path d="M486 122L265 3c-7-4-16-4-23 0L11 122c-15 8-15 27 0 35l231 120c7 4 16 4 23 0l221-120c15-8 15-27 0-35zM248 214c-46 0-83-33-83-75s37-74 83-74 83 33 83 74-37 75-83 75z"/></svg><span class="name">amarelo</span></div>
<img src="../assets/product-amarelo.png" alt=""/>

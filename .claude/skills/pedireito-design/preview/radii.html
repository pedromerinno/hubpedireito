<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:var(--pd-cream-1);display:grid;grid-template-columns:repeat(5,1fr);gap:12px;font-family:var(--font-narrow);font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--pd-verde-escuro)}
.box{height:80px;background:#2B9402;display:flex;align-items:flex-end;justify-content:center;padding:6px;color:#FEBF00}
code{font-family:ui-monospace,monospace;font-size:9px}
</style></head><body>
<div><div class="box" style="border-radius:0"><code>0</code></div><div style="text-align:center;margin-top:4px">r-0</div></div>
<div><div class="box" style="border-radius:8px"><code>8</code></div><div style="text-align:center;margin-top:4px">r-sm</div></div>
<div><div class="box" style="border-radius:12px"><code>12</code></div><div style="text-align:center;margin-top:4px">r-md</div></div>
<div><div class="box" style="border-radius:20px"><code>20</code></div><div style="text-align:center;margin-top:4px">r-lg</div></div>
<div><div class="box" style="border-radius:40px"><code>40</code></div><div style="text-align:center;margin-top:4px">r-2x</div></div>
</body></html>

<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:var(--pd-cream-1);font-family:var(--font-narrow);font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--pd-verde-escuro)}
table{width:100%;border-collapse:collapse}
td{padding:8px 4px;border-bottom:1px solid rgba(0,0,0,.08)}
.sz{font-family:var(--font-display);text-transform:lowercase;letter-spacing:.01em;color:#000;line-height:1}
.n{font-family:ui-monospace,monospace;font-size:10px;opacity:.7;text-transform:none;letter-spacing:0}
</style></head><body>
<table>
<tr><td><span class="sz" style="font-size:12px">Aa</span></td><td>xs</td><td>12</td><td class="n">--t-xs</td></tr>
<tr><td><span class="sz" style="font-size:16px">Aa</span></td><td>md</td><td>16</td><td class="n">--t-md</td></tr>
<tr><td><span class="sz" style="font-size:24px">Aa</span></td><td>xl</td><td>24</td><td class="n">--t-xl</td></tr>
<tr><td><span class="sz" style="font-size:32px">Aa</span></td><td>2xl</td><td>32</td><td class="n">--t-2xl</td></tr>
<tr><td><span class="sz" style="font-size:48px">Aa</span></td><td>3xl</td><td>48</td><td class="n">--t-3xl</td></tr>
<tr><td><span class="sz" style="font-size:72px">Aa</span></td><td>4xl</td><td>72</td><td class="n">--t-4xl</td></tr>
</table>
</body></html>

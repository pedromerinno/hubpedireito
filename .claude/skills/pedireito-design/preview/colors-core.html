<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--pd-cream-1);display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 48px)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:640px}
.sw{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;font-family:var(--font-narrow);font-size:11px;text-transform:uppercase;letter-spacing:0.04em}
.sw b{font-family:var(--font-body);font-weight:700;font-size:13px;display:block;letter-spacing:0}
.sw code{display:block;opacity:0.75;font-family:ui-monospace,Menlo,monospace;font-size:10px;margin-top:2px}
</style></head><body>
<div class="grid">
  <div class="sw" style="background:#2B9402;color:#FEBF00"><b>Verde</b><code>#2B9402</code></div>
  <div class="sw" style="background:#FEBF00;color:#1B6200"><b>Amarelo</b><code>#FEBF00</code></div>
  <div class="sw" style="background:#005CE1;color:#FEBF00"><b>Azul</b><code>#005CE1</code></div>
  <div class="sw" style="background:#F6F6E5;color:#2B9402;border:1px solid rgba(0,0,0,.1)"><b>Cream 1</b><code>#F6F6E5</code></div>
  <div class="sw" style="background:#F9F1D1;color:#005CE1;border:1px solid rgba(0,0,0,.1)"><b>Cream 2</b><code>#F9F1D1</code></div>
  <div class="sw" style="background:#FF0000;color:#fff"><b>Alerta</b><code>#FF0000</code></div>
</div>
</body></html>

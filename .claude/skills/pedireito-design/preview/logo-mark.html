<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:0;font-family:var(--font-display)}
.row{display:grid;grid-template-columns:1fr 1fr 1fr;min-height:260px}
.cell{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:28px}
.cell svg{display:block}
.cell .word{font-family:var(--font-display);font-size:40px;line-height:1;letter-spacing:.02em}
.cell .tag{font-family:'Bayon',sans-serif;font-size:12px;letter-spacing:.18em;text-transform:uppercase;opacity:.85}
.c-green{background:#2B9402;color:#FEBF00}
.c-cream{background:#F6F6E5;color:#2B9402}
.c-yellow{background:#FEBF00;color:#005CE1}
</style></head><body>
<div class="row">
  <div class="cell c-green">
    <svg width="120" height="68" viewBox="0 0 497 280" fill="currentColor"><path d="M486 122L265 3c-7-4-16-4-23 0L11 122c-15 8-15 27 0 35l231 120c7 4 16 4 23 0l221-120c15-8 15-27 0-35zM248 214c-46 0-83-33-83-75s37-74 83-74 83 33 83 74-37 75-83 75z"/></svg>
    <div class="tag">Mark only</div>
  </div>
  <div class="cell c-cream">
    <div class="word">PéDireito</div>
    <div class="tag">Wordmark</div>
  </div>
  <div class="cell c-yellow">
    <svg width="56" height="32" viewBox="0 0 497 280" fill="currentColor"><path d="M486 122L265 3c-7-4-16-4-23 0L11 122c-15 8-15 27 0 35l231 120c7 4 16 4 23 0l221-120c15-8 15-27 0-35zM248 214c-46 0-83-33-83-75s37-74 83-74 83 33 83 74-37 75-83 75z"/></svg>
    <div class="word" style="font-size:32px">PéDireito</div>
    <div class="tag">Lockup</div>
  </div>
</div>
</body></html>

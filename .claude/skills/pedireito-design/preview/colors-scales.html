<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:var(--pd-cream-1)}
.row{display:flex;gap:0;margin-bottom:6px;border-radius:6px;overflow:hidden}
.c{flex:1;aspect-ratio:2.5/1;display:flex;align-items:flex-end;padding:8px;font-family:var(--font-narrow);font-size:10px;text-transform:uppercase;letter-spacing:.04em}
.c code{font-family:ui-monospace,monospace;font-size:9px;margin-left:auto;opacity:.75}
h4{font-family:var(--font-lead);font-size:14px;letter-spacing:.04em;text-transform:uppercase;margin:8px 0 6px;color:var(--pd-verde-escuro)}
</style></head><body>
<h4>Green scale</h4>
<div class="row">
  <div class="c" style="background:#1B6200;color:#fff">Verde Escuro<code>#1B6200</code></div>
  <div class="c" style="background:#2B9402;color:#FEBF00">Verde<code>#2B9402</code></div>
  <div class="c" style="background:#02A00E;color:#fff">Verde Mid<code>#02A00E</code></div>
  <div class="c" style="background:#67A80D;color:#fff">Verde Lima<code>#67A80D</code></div>
</div>
<h4>Yellow scale</h4>
<div class="row">
  <div class="c" style="background:#FFAE00;color:#1B6200">Amarelo Warm<code>#FFAE00</code></div>
  <div class="c" style="background:#FEBF00;color:#1B6200">Amarelo<code>#FEBF00</code></div>
  <div class="c" style="background:#FFCE00;color:#1B6200">Amarelo Sat<code>#FFCE00</code></div>
  <div class="c" style="background:#FFF1C8;color:#1B6200">Butter<code>#FFF1C8</code></div>
</div>
<h4>Blue scale</h4>
<div class="row">
  <div class="c" style="background:#0046B9;color:#FEBF00">Azul Escuro<code>#0046B9</code></div>
  <div class="c" style="background:#005CE1;color:#FEBF00">Azul<code>#005CE1</code></div>
  <div class="c" style="background:#0053CC;color:#FEBF00">Azul Mid<code>#0053CC</code></div>
  <div class="c" style="background:#0600FF;color:#FEBF00">Electric<code>#0600FF</code></div>
</div>
</body></html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Pé Direito — Post-vídeo · fazer o certo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Bayon&display=swap">
<style>
/* ============================================================
   Pé Direito — Post-vídeo POC · fazer o certo
   1080×1350 retrato · vídeo de fundo + texto manifesto sobreposto
   ============================================================ */

:root{
  --verde:  #2B9402;
  --amarelo:#FEBF00;
  --azul:   #005CE1;
  --cream:  #F9F1D1;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#1a1a1a;font-family:system-ui,sans-serif;min-height:100vh}
body{padding:40px;display:flex;flex-direction:column;align-items:center;gap:32px}

.hero{font-family:'Anton',sans-serif;font-size:42px;color:var(--cream);text-transform:lowercase;letter-spacing:.01em;font-weight:400}
.hero b{font-family:'Archivo Black',sans-serif;color:var(--amarelo)}

/* ══════════ CANVAS POST-VÍDEO 1080×1350 ══════════ */
.canvas{
  position:relative;
  width:1080px;
  height:1350px;
  overflow:hidden;
  transform-origin:0 0;
  transform:scale(calc(540/1080));
  margin-bottom:calc(-675px);
}

.canvas .bg-video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
}

/* overlay escuro pra dar contraste ao texto */
.canvas .overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.42);
  z-index:2;
  pointer-events:none;
}

.canvas .content{
  position:absolute;
  inset:0;
  z-index:3;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:flex-start;
  padding:260px 130px;
  gap:36px;
}

/* mark — ícone-diamante top-left */
.canvas .mark{
  position:absolute;
  top:130px;
  left:130px;
  z-index:4;
  line-height:0;
}
.canvas .mark svg{width:82px;height:48px;display:block;color:var(--amarelo)}

/* hero typography */
.canvas .body-copy{
  font-family:'Arial Narrow','Inter',system-ui,sans-serif;
  font-size:46px;
  line-height:1.3;
  color:var(--cream);
  font-weight:400;
  max-width:820px;
}

.canvas .hero-line{
  font-family:'Anton','Archivo Black',sans-serif;
  text-transform:uppercase;
  letter-spacing:-.02em;
  line-height:.96;
  font-weight:400;
  font-size:176px;
  color:var(--amarelo);
  max-width:820px;
  overflow-wrap:break-word;
}
.canvas .hero-line b{
  font-family:'Archivo Black',sans-serif;
  font-weight:900;
  letter-spacing:-.035em;
  font-size:1.10em;
}

/* mark wordmark bottom (PéDireito.) */
.canvas .wordmark{
  position:absolute;
  bottom:130px;
  left:130px;
  z-index:4;
  font-family:'Anton',sans-serif;
  font-size:48px;
  color:var(--cream);
  letter-spacing:-.01em;
}
.canvas .wordmark b{font-family:'Archivo Black',sans-serif;font-weight:900;color:var(--amarelo)}

/* ══════════ EXPORT BUTTON ══════════ */
.tools{
  display:flex;
  flex-direction:column;
  gap:14px;
  align-items:center;
  margin-top:24px;
}
.btn{
  background:var(--verde);
  color:var(--amarelo);
  font-family:'Bayon',sans-serif;
  font-size:18px;
  letter-spacing:.16em;
  text-transform:uppercase;
  padding:16px 30px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}
.btn-hint{
  color:var(--cream);
  font-family:system-ui,sans-serif;
  font-size:13px;
  text-align:center;
  max-width:540px;
  line-height:1.5;
  opacity:.7;
}
.btn-hint code{background:rgba(255,255,255,.1);padding:2px 6px;border-radius:4px;font-family:monospace}
</style>
</head>
<body>

<div class="hero">post-vídeo · <b>fazer o certo</b> · 1080×1350</div>

<div class="canvas" id="canvas">
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="assets/videos/vid-01.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>
  <div class="mark">
    <svg viewBox="0 0 497 280" fill="currentColor"><path d="M486 122L265 3c-7-4-16-4-23 0L11 122c-15 8-15 27 0 35l231 120c7 4 16 4 23 0l221-120c15-8 15-27 0-35zM248 214c-46 0-83-33-83-75s37-74 83-74 83 33 83 74-37 75-83 75z"/></svg>
  </div>
  <div class="content">
    <div class="body-copy">a marca do<br>povo brasileiro.</div>
    <div class="hero-line">fazer o<br><b>certo</b>.</div>
  </div>
  <div class="wordmark"><b>Pé</b>Direito.</div>
</div>

<div class="tools">
  <div class="btn-hint">
    Pra exportar como <b>mp4</b>, rode no terminal:<br>
    <code>node /tmp/pedireito-review/render-video.mjs &lt;index.html&gt; &lt;assets/videos/vid-01.mp4&gt; &lt;saida.mp4&gt;</code>
  </div>
</div>

</body>
</html>
